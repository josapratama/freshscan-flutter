name: freshscan
description: Aplikasi scan buah dan sayuran menggunakan AI
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  permission_handler: ^11.3.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env
